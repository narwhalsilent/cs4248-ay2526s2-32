# configs/t5_training_rebalanced.yaml

model:
  name_or_path: "t5-base"
  type: "t5"

data:
  train_file: "data/silver/rebalanced/train.csv"
  validation_file: "data/silver/rebalanced/val.csv"
  max_source_length: 128
  max_target_length: 128
  source_prefix: "translate factual to satire: "

training:
  output_dir: "checkpoints/t5_satire_rebalanced"
  num_train_epochs: 5
  per_device_train_batch_size: 16
  per_device_eval_batch_size: 16
  learning_rate: 5e-5
  weight_decay: 0.01
  logging_steps: 50
  evaluation_strategy: "epoch"
  save_strategy: "epoch"
  predict_with_generate: true
  fp16: true
  anti_copy_weight: 0.1

generation:
  num_beams: 4
  temperature: 0.9
